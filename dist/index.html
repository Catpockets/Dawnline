          r *= sh; g *= sh; b *= sh;
        }

        // fine deterministic texture noise (grain that survives zoom)
        let hsh = (px * 374761393 + py * 668265263) | 0;
        hsh = Math.imul(hsh ^ (hsh >>> 13), 1274126177);
        const nz = 0.955 + (((hsh >>> 16) & 255) / 255) * 0.09;
        d[idx * 4] = clamp(r * nz, 0, 255);
        d[idx * 4 + 1] = clamp(g * nz, 0, 255);
        d[idx * 4 + 2] = clamp(b * nz, 0, 255);
      }
    }
    tctx.putImageData(img, 0, 0);

    if (w.riverPaths && w.riverPaths.length) {
      tctx.save();
      tctx.lineCap = 'round';
      tctx.lineJoin = 'round';
      for (const river of w.riverPaths) {
        if (river.length < 2) continue;
        tctx.beginPath();
        tctx.moveTo(river[0].x * S, river[0].y * S);
        for (let i = 1; i < river.length; i++) tctx.lineTo(river[i].x * S, river[i].y * S);
        tctx.strokeStyle = 'rgba(20, 115, 160, 0.62)';
        tctx.lineWidth = Math.max(1, S * 0.42);
        tctx.stroke();
        tctx.strokeStyle = 'rgba(110, 220, 240, 0.72)';
        tctx.lineWidth = Math.max(1, S * 0.18);
        tctx.stroke();
      }
      tctx.restore();
    }
  }

  // ---- data overlays as translucent heat maps -----------------------------
  updateOverlay() {
    const sim = this.sim, w = sim.world;
    const ctx = this.overlayCanvas.getContext('2d');
    const img = ctx.createImageData(w.w, w.h);
    const d = img.data;
    const set = (i, r, g, b, a) => { d[i * 4] = r; d[i * 4 + 1] = g; d[i * 4 + 2] = b; d[i * 4 + 3] = a; };
    const heat = (i, v, col) => { const a = clamp(v, 0, 1); set(i, col[0], col[1], col[2], a * 200); };
    const n = w.w * w.h;

    if (this.overlay === 'food') {
      for (let i = 0; i < n; i++) heat(i, w.food[i] / 90, [110, 235, 120]);
    } else if (this.overlay === 'water') {
      for (let i = 0; i < n; i++) heat(i, w.water[i] / 100, [80, 170, 255]);
    } else if (this.overlay === 'fertility') {
      for (let i = 0; i < n; i++) heat(i, w.fertility[i], [200, 240, 90]);
    } else if (this.overlay === 'disease') {
      const sickMap = new Float32Array(n);
      for (const a of sim.agents) if (!a.dead && a.sick) sickMap[(a.y | 0) * w.w + (a.x | 0)] += 0.5;
      for (let i = 0; i < n; i++) heat(i, w.disease[i] * 0.35 + sickMap[i], [170, 240, 60]);
    } else if (this.overlay === 'conflict') {
      for (let i = 0; i < n; i++) heat(i, w.danger[i], [255, 80, 60]);
    } else if (this.overlay === 'density') {
      const dm = new Float32Array(n);
      for (const a of sim.agents) if (!a.dead) dm[(a.y | 0) * w.w + (a.x | 0)] += 0.25;
      for (let i = 0; i < n; i++) heat(i, dm[i], [255, 180, 80]);
    } else if (this.overlay === 'trade') {
      for (let i = 0; i < n; i++) heat(i, sim.tradeMap[i] / 3.5, [95, 225, 245]);
    } else if (this.overlay === 'food-signal') {
      for (let i = 0; i < n; i++) heat(i, sim.foodSignal[i] / 2.5, [140, 245, 120]);
    } else if (this.overlay === 'danger-signal') {
      for (let i = 0; i < n; i++) heat(i, sim.dangerSignal[i] / 2.5, [255, 70, 70]);
    } else if (this.overlay === 'migration') {
      for (let i = 0; i < n; i++) heat(i, sim.migrationMap[i] / 3.5, [255, 205, 100]);
    } else if (this.overlay === 'resources') {
      // strongest specialty deposit per tile, color-coded
      const KINDS = [
        [w.herbs, [90, 230, 120]], [w.clay, [222, 148, 90]], [w.salt, [240, 240, 235]],
        [w.fish, [90, 190, 250]], [w.metal, [170, 175, 190]], [w.gems, [200, 120, 250]]
      ];
      for (let i = 0; i < n; i++) {
        let bv = 6, bc = null;
        for (const [layer, col] of KINDS) {
          if (layer && layer[i] > bv) { bv = layer[i]; bc = col; }
        }
        if (bc) set(i, bc[0], bc[1], bc[2], Math.min(230, 60 + bv * 3.4));
      }
    } else if (this.overlay === 'ideology') {
      // settlements glow in their dominant creed's color
      for (const s of sim.settlements) {
        if (s.dead || s.dominantIdeology == null) continue;
        const I = sim.ideologyById.get(s.dominantIdeology);
        if (!I) continue;
        const col = hueRgb(I.hue);
        const R = 5 + Math.sqrt(s.members) * 1.6;
        const x0 = Math.max(0, (s.x - R) | 0), x1 = Math.min(w.w - 1, (s.x + R) | 0);
        const y0 = Math.max(0, (s.y - R) | 0), y1 = Math.min(w.h - 1, (s.y + R) | 0);
        for (let y = y0; y <= y1; y++) {
          for (let x = x0; x <= x1; x++) {
            const dd = Math.hypot(x - s.x, y - s.y);
            if (dd > R) continue;
            const i = y * w.w + x;
            const v = (1 - dd / R) * 0.85;
            if (v * 210 > d[i * 4 + 3]) set(i, col[0], col[1], col[2], v * 210);
          }
        }
      }
    } else if (['influence', 'tech', 'wealth', 'culture'].includes(this.overlay)) {
      // settlement-field overlays: paint radial gradients per settlement
      for (const s of sim.settlements) {
        if (s.dead) continue;
        const R = 5 + Math.sqrt(s.members) * 1.6;
        let col, mag;
        if (this.overlay === 'influence') { col = hueRgb(s.hue); mag = 0.8; }
        else if (this.overlay === 'tech') { col = [90, 210, 255]; mag = clamp(s.tech / 10, 0.08, 1); }
        else if (this.overlay === 'wealth') { col = [255, 215, 90]; mag = clamp(s.wealth / 120, 0.08, 1); }
        else { col = CULTURE_COLORS[dominantCulture(s)] || [200, 200, 200]; mag = 0.85; }
        const x0 = Math.max(0, (s.x - R) | 0), x1 = Math.min(w.w - 1, (s.x + R) | 0);
        const y0 = Math.max(0, (s.y - R) | 0), y1 = Math.min(w.h - 1, (s.y + R) | 0);
        for (let y = y0; y <= y1; y++) {
          for (let x = x0; x <= x1; x++) {
            const dd = Math.hypot(x - s.x, y - s.y);
            if (dd > R) continue;
            const i = y * w.w + x;
            const v = (1 - dd / R) * mag;
            const prev = d[i * 4 + 3] / 255;
            if (v > prev) set(i, col[0], col[1], col[2], v * 210);
          }
        }
      }
    }
    ctx.putImageData(img, 0, 0);
  }

  // ---- coordinate transforms ----------------------------------------------
  worldToScreen(x, y) {
    const v = this.view;
    return [
      (x - v.cx) * v.scale + this.canvas.width / 2,
      (y - v.cy) * v.scale + this.canvas.height / 2
    ];
  }
  screenToWorld(px, py) {
    const v = this.view;
    return [
      (px - this.canvas.width / 2) / v.scale + v.cx,
      (py - this.canvas.height / 2) / v.scale + v.cy
    ];
  }
  zoomAt(px, py, factor) {
    const [wx, wy] = this.screenToWorld(px, py);
    this.view.scale = clamp(this.view.scale * factor, 2, 42);
    const [nx, ny] = this.screenToWorld(px, py);
    this.view.cx += wx - nx; this.view.cy += wy - ny;
  }
  panBy(dxPx, dyPx) {
    this.view.cx -= dxPx / this.view.scale;
    this.view.cy -= dyPx / this.view.scale;
  }

  // ---- main draw, called every animation frame ----------------------------
  // `alpha` (0..1) interpolates agent positions between the previous and the
  // current simulation tick, keeping motion silky at sub-1× speeds.
  draw(alpha = 1) {
    const sim = this.sim;
    const ctx = this.ctx;
    const W = this.canvas.width, H = this.canvas.height;
    ctx.fillStyle = '#05080f';
    ctx.fillRect(0, 0, W, H);
    if (!sim) return;
    const w = sim.world;
    const v = this.view;

    if (this.overlay !== 'none' && sim.tick - this.lastOverlayTick >= 12) {
      this.updateOverlay();
      this.lastOverlayTick = sim.tick;
    }

    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(v.scale, v.scale);
    ctx.translate(-v.cx, -v.cy);
    ctx.imageSmoothingEnabled = true;

    ctx.drawImage(this.terrainCanvas, 0, 0, w.w, w.h);
    if (this.overlay !== 'none' && this.overlay !== 'trade') {
      ctx.globalAlpha = 0.75;
      ctx.drawImage(this.overlayCanvas, 0, 0, w.w, w.h);
      ctx.globalAlpha = 1;
    }

    // --- trade routes: all routes when toggled, or focused routes for selected city ---
    const selectedSettlementId = this.selected?.type === 'settlement' ? this.selected.id : null;
    const highlightedSettlements = new Set();
    const showAllRoutes = this.showRoutes;
    if (selectedSettlementId !== null) highlightedSettlements.add(selectedSettlementId);
    if (showAllRoutes || selectedSettlementId !== null) {
      ctx.lineCap = 'round';
      for (const r of sim.routes.values()) {
        const A = sim.settlementById.get(r.a), B = sim.settlementById.get(r.b);
        if (!A || !B) continue;
        const selectedRoute = selectedSettlementId !== null && (r.a === selectedSettlementId || r.b === selectedSettlementId);
        if (!showAllRoutes && !selectedRoute) continue;
        if (selectedRoute) {
          highlightedSettlements.add(r.a);
          highlightedSettlements.add(r.b);
        }
        ctx.strokeStyle = selectedRoute
          ? `rgba(145, 245, 255, ${0.42 + r.strength * 0.48})`
          : `rgba(120, 230, 255, ${0.10 + r.strength * 0.32})`;
        ctx.lineWidth = selectedRoute ? (0.18 + r.strength * 0.28) : (0.08 + r.strength * 0.16);
        ctx.setLineDash([0.8, 0.6]);
        ctx.lineDashOffset = -(sim.tick % 1000) * 0.05;
        ctx.beginPath();
        if (r.path && r.path.length > 1) {
          ctx.moveTo(r.path[0].x, r.path[0].y);
          for (let i = 1; i < r.path.length; i++) ctx.lineTo(r.path[i].x, r.path[i].y);
        } else {
          const mx = (A.x + B.x) / 2 + (A.y - B.y) * 0.12;
          const my = (A.y + B.y) / 2 + (B.x - A.x) * 0.12;
          ctx.moveTo(A.x, A.y);
          ctx.quadraticCurveTo(mx, my, B.x, B.y);
        }
        ctx.stroke();
      }
      ctx.setLineDash([]);
    }

    // --- migration trails ---
    if (this.showTrails) {
      ctx.strokeStyle = 'rgba(255, 235, 170, 0.22)';
      ctx.lineWidth = 0.12;
      for (const a of sim.agents) {
        if (a.dead || a.state !== 'migrating' || a.trail.length < 4) continue;
        ctx.beginPath();
        ctx.moveTo(a.trail[0], a.trail[1]);
        for (let i = 2; i < a.trail.length; i += 2) ctx.lineTo(a.trail[i], a.trail[i + 1]);
        ctx.stroke();
      }
    }

    // --- gravestones: the dead rest where they fell (clickable) ---
    if (v.scale > 3 && sim.graves && sim.graves.length) {
      for (const gr of sim.graves) {
        ctx.fillStyle = 'rgba(206, 212, 224, 0.88)';
        ctx.fillRect(gr.x - 0.14, gr.y - 0.26, 0.28, 0.3);
        ctx.beginPath(); ctx.arc(gr.x, gr.y - 0.26, 0.14, Math.PI, 0); ctx.fill();
        ctx.fillStyle = 'rgba(82, 88, 104, 0.95)';
        ctx.fillRect(gr.x - 0.025, gr.y - 0.24, 0.05, 0.15);
        ctx.fillRect(gr.x - 0.07, gr.y - 0.2, 0.14, 0.045);
      }
    }

    // --- agents: tiny glowing dots, colored by home settlement ---
    const rA = clamp(0.14 + v.scale * 0.006, 0.12, 0.32);
    for (const a of sim.agents) {
      if (a.dead) continue;
      let fill;
      if (this.overlay === 'ideology' && a.ideology != null) {
        const I = sim.ideologyById.get(a.ideology);
        fill = I ? `hsla(${I.hue}, 85%, 66%, 0.95)` : 'rgba(200,200,200,0.8)';
      }
      else if (a.sick) fill = 'rgba(150, 255, 90, 0.95)';
      else if (a.state === 'fighting') fill = 'rgba(255, 70, 70, 0.95)';
      else if (a.home >= 0) {
        const s = sim.settlementById.get(a.home);
        fill = s ? `hsla(${s.hue}, 75%, 68%, 0.92)` : 'rgba(230,230,215,0.85)';
      } else fill = 'rgba(235, 232, 210, 0.8)';
      ctx.fillStyle = fill;
      // interpolate between tick-start (px,py) and current (x,y) positions
      const ax = a.px !== undefined ? a.px + (a.x - a.px) * alpha : a.x;
      const ay = a.py !== undefined ? a.py + (a.y - a.py) * alpha : a.y;
      ctx.beginPath();
      ctx.arc(ax, ay, a.age < 14 ? rA * 0.6 : rA, 0, 6.283); // children are smaller
      ctx.fill();
    }

    // --- ruins: fallen settlements leave a small site marker ---
    const ruinLabels = [];
    if (sim.ruins && sim.ruins.length) {
      ctx.save();
      ctx.lineCap = 'round';
      for (const r of sim.ruins) {
        ctx.strokeStyle = r.color || 'rgba(226, 232, 240, 0.75)';
        ctx.lineWidth = 0.14;
        ctx.beginPath(); ctx.arc(r.x, r.y, 1.0, 0, 6.283); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(r.x - 0.62, r.y - 0.62);
        ctx.lineTo(r.x + 0.62, r.y + 0.62);
        ctx.moveTo(r.x + 0.62, r.y - 0.62);
        ctx.lineTo(r.x - 0.62, r.y + 0.62);
        ctx.stroke();
        if (v.scale > 3.5) ruinLabels.push(r);
      }
      ctx.restore();
    }

    // --- settlements: glow disc + ring ---
    const cityLabels = [];
    for (const s of sim.settlements) {
      if (s.dead) continue;
      const R = 0.7 + Math.sqrt(s.members) * 0.22;
      const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, R * 2.2);
      g.addColorStop(0, `hsla(${s.hue}, 85%, 65%, 0.35)`);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(s.x, s.y, R * 2.2, 0, 6.283); ctx.fill();
      ctx.strokeStyle = `hsla(${s.hue}, 85%, 70%, 0.95)`;
      ctx.lineWidth = 0.14;
      ctx.beginPath(); ctx.arc(s.x, s.y, R, 0, 6.283); ctx.stroke();
      if (highlightedSettlements.has(s.id)) {
        ctx.strokeStyle = s.id === selectedSettlementId
          ? 'rgba(255, 255, 255, 0.95)'
          : 'rgba(145, 245, 255, 0.9)';
        ctx.lineWidth = s.id === selectedSettlementId ? 0.18 : 0.14;
        ctx.beginPath(); ctx.arc(s.x, s.y, R + 0.45, 0, 6.283); ctx.stroke();
      }
      // walls show as an extra square outline
      if (s.buildings.walls > 0) {
        ctx.strokeStyle = `hsla(${s.hue}, 40%, 85%, 0.8)`;
        ctx.lineWidth = 0.1;
        ctx.strokeRect(s.x - R - 0.3, s.y - R - 0.3, (R + 0.3) * 2, (R + 0.3) * 2);
      }
      if (v.scale > 5.5) cityLabels.push({ x: s.x, y: s.y - R - 0.55, name: s.name });
    }

    // --- transient flashes: fights, wars, disasters ---
    for (const f of sim.flashes) {
      const t = f.kind === 'disaster' ? 1 - f.ttl / 90 : 1 - f.ttl / (f.kind === 'war' ? 45 : 20);
      if (f.kind === 'fight') {
        ctx.strokeStyle = `rgba(255, 90, 60, ${1 - t})`;
        ctx.lineWidth = 0.15;
        ctx.beginPath(); ctx.arc(f.x, f.y, 0.4 + t * 1.6, 0, 6.283); ctx.stroke();
      } else if (f.kind === 'war') {
        ctx.strokeStyle = `rgba(255, 150, 40, ${0.9 - t * 0.9})`;
        ctx.lineWidth = 0.25;
        ctx.beginPath(); ctx.arc(f.x, f.y, 1 + t * 4, 0, 6.283); ctx.stroke();
      } else if (f.kind === 'disaster') {
        ctx.strokeStyle = `rgba(255, 60, 90, ${0.8 - t * 0.8})`;
        ctx.lineWidth = 0.3;
        ctx.beginPath(); ctx.arc(f.x, f.y, (f.r || 9) * (0.4 + t * 0.8), 0, 6.283); ctx.stroke();
      }
    }

    // --- family circle highlighting for the selected agent ---
    if (this.selected && this.selected.type === 'agent') {
      const a = sim.agentById.get(this.selected.id);
      if (a) {
        const ring = (m, color, r) => {
          ctx.strokeStyle = color; ctx.lineWidth = 0.12;
          ctx.beginPath(); ctx.arc(m.x, m.y, r, 0, 6.283); ctx.stroke();
          if (v.scale > 4) {
            ctx.strokeStyle = 'rgba(255,255,255,0.16)'; ctx.lineWidth = 0.07;
            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(m.x, m.y); ctx.stroke();
          }
        };
        if (a.spouse >= 0) {
          const sp = sim.agentById.get(a.spouse);
          if (sp) ring(sp, 'rgba(125, 211, 252, 0.95)', 0.55);
        }
        for (const pid of [a.mother, a.father]) {
          const p = pid >= 0 ? sim.agentById.get(pid) : null;
          if (p) ring(p, 'rgba(251, 191, 36, 0.9)', 0.5);
        }
        for (const cid of a.children) {
          const c = sim.agentById.get(cid);
          if (c) ring(c, 'rgba(74, 222, 128, 0.9)', 0.4);
        }
      }
    }
    // --- colony ↔ parent-city lineage link for the selected settlement ---
    if (this.selected && this.selected.type === 'settlement') {
      const s = sim.settlementById.get(this.selected.id);
      const links = [];
      if (s && s.parentSettlementId != null) {
        const p = sim.settlementById.get(s.parentSettlementId);
        if (p) links.push([s, p]);
      }
      if (s) {
        for (const o of sim.settlements) {
          if (!o.dead && o.parentSettlementId === s.id) links.push([o, s]);
        }
      }
      ctx.setLineDash([0.5, 0.5]);
      ctx.strokeStyle = 'rgba(251, 191, 36, 0.55)';
      ctx.lineWidth = 0.12;
      for (const [A, B] of links) {
        ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(B.x, B.y); ctx.stroke();
      }
      ctx.setLineDash([]);
    }

    // --- selection highlight ---
    if (this.selected) {
      let sx, sy, sr;
      if (this.selected.type === 'agent') {
        const a = sim.agentById.get(this.selected.id);
        if (a) { sx = a.x; sy = a.y; sr = 0.8; }
      } else if (this.selected.type === 'settlement') {
        const s = sim.settlementById.get(this.selected.id);
        if (s) { sx = s.x; sy = s.y; sr = 1 + Math.sqrt(s.members) * 0.25; }
      } else if (this.selected.type === 'ruin') {
        const r = sim.ruins?.find((ruin) => ruin.id === this.selected.id);
        if (r) { sx = r.x; sy = r.y; sr = 1.3; }
      } else if (this.selected.type === 'grave') {
        const gr = sim.graves?.find((g) => g.id === this.selected.id);
        if (gr) { sx = gr.x; sy = gr.y - 0.1; sr = 0.55; }
      }
      if (sx !== undefined) {
        const pulse = 0.15 + Math.sin(performance.now() / 220) * 0.08;
        ctx.strokeStyle = 'rgba(255,255,255,0.95)';
        ctx.lineWidth = 0.12;
        ctx.beginPath(); ctx.arc(sx, sy, sr + pulse, 0, 6.283); ctx.stroke();
      }
    }
    ctx.restore();

    if (ruinLabels.length) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.lineJoin = 'round';
      ctx.miterLimit = 2;
      for (const label of ruinLabels) {
        const [sx, sy] = this.worldToScreen(label.x, label.y);
        const color = label.color || '#f87171';
        ctx.font = '700 24px "Segoe UI Symbol", "Segoe UI Emoji", sans-serif';
        ctx.textBaseline = 'middle';
        ctx.lineWidth = 5;
        ctx.strokeStyle = 'rgba(5, 8, 15, 0.82)';
        ctx.strokeText(label.icon || '☠', sx, sy - 7);
        ctx.fillStyle = color;
        ctx.fillText(label.icon || '☠', sx, sy - 7);
        if (v.scale > 5.5) {
          ctx.font = '700 12px "Segoe UI", sans-serif';
          ctx.textBaseline = 'top';
          ctx.lineWidth = 3;
          ctx.strokeStyle = 'rgba(5, 8, 15, 0.88)';
          ctx.strokeText(label.cause || 'Collapse', sx, sy + 9);
          ctx.fillStyle = 'rgba(246, 249, 255, 0.96)';
          ctx.fillText(label.cause || 'Collapse', sx, sy + 9);
        }
      }
      ctx.restore();
    }

    // --- event icons: emoji floating up over cities (war, trade, plague…) ---
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const f of sim.flashes) {
      if (f.kind !== 'icon') continue;
      const life = f.ttl0 || 70;
      const t = 1 - f.ttl / life;
      const [sx, sy] = this.worldToScreen(f.x, f.y);
      if (sx < -40 || sy < -40 || sx > W + 40 || sy > H + 40) continue;
      ctx.font = '22px "Segoe UI Emoji", "Segoe UI Symbol", sans-serif';
      ctx.globalAlpha = Math.max(0, Math.min(1, (1 - t) * 2.2));
      ctx.fillText(f.char, sx, sy - 22 - t * 18);
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    if (cityLabels.length) {
      ctx.save();
      ctx.font = '600 13px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.lineJoin = 'round';
      ctx.miterLimit = 2;
      for (const label of cityLabels) {
        const [sx, sy] = this.worldToScreen(label.x, label.y);
        ctx.lineWidth = 4;
        ctx.strokeStyle = 'rgba(5, 8, 15, 0.78)';
        ctx.strokeText(label.name, sx, sy);
        ctx.fillStyle = 'rgba(246, 249, 255, 0.96)';
        ctx.fillText(label.name, sx, sy);
      }
      ctx.restore();
    }
  }

  /** Hit-test a click: nearest agent within ~1 tile, else settlement. */
  pickAt(px, py) {
    const [wx, wy] = this.screenToWorld(px, py);
    const sim = this.sim;
    let bestR = null, bestRPx = 24;
    if (sim.ruins) {
      for (const r of sim.ruins) {
        const [rx, ry] = this.worldToScreen(r.x, r.y);
        const d = Math.hypot(rx - px, ry - py);
        if (d < bestRPx) { bestRPx = d; bestR = r; }
      }
    }
    if (bestR) return { type: 'ruin', id: bestR.id };
    // gravestones: small, so use a screen-space hit radius
    let bestG = null, bestGPx = 12;
    if (sim.graves) {
      for (const gr of sim.graves) {
        const [gx, gy] = this.worldToScreen(gr.x, gr.y);
        const d = Math.hypot(gx - px, gy - py);
        if (d < bestGPx) { bestGPx = d; bestG = gr; }
      }
    }
    let bestA = null, bestD = 1.6;
    for (const a of sim.agents) {
      if (a.dead) continue;
      const d = Math.hypot(a.x - wx, a.y - wy);
      if (d < bestD) { bestD = d; bestA = a; }
    }
    if (bestA && bestD < 0.35 && bestG) return { type: 'agent', id: bestA.id };
    if (bestG) return { type: 'grave', id: bestG.id };
    if (bestA && bestD < 0.9) return { type: 'agent', id: bestA.id };
    let bestS = null, bestSD = 99;
    for (const s of sim.settlements) {
      if (s.dead) continue;
      const d = Math.hypot(s.x - wx, s.y - wy);
      const R = 1.4 + Math.sqrt(s.members) * 0.25;
      if (d < R + 0.6 && d < bestSD) { bestSD = d; bestS = s; }
    }
    if (bestS) return { type: 'settlement', id: bestS.id };
    if (bestA) return { type: 'agent', id: bestA.id };
    return null;
  }
}

function hueRgb(h) {
  // quick hue → rgb (s=0.7, l=0.6)
  const f = (n) => {
    const k = (n + h / 30) % 12;
    const c = 0.6 - 0.28 * Math.max(-1, Math.min(k - 3, 9 - k, 1));
    return Math.round(c * 255);
  };
  return [f(0), f(8), f(4)];
}

// Written with React.createElement (no JSX) so the project builds both under
// Vite and under the dependency-free standalone bundler in scripts/.

/**
 * Tiny time-series chart drawn on its own canvas (no chart library).
 * Redraws whenever the snapshot re-renders; cheap enough at 4 Hz.
 */
function MiniChart({ label, data, color = '#5eead4', format = (v) => Math.round(v) }) {
  const ref = useRef(null);

  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    const wCss = canvas.clientWidth || 120, hCss = 42;
    canvas.width = wCss * dpr; canvas.height = hCss * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, wCss, hCss);
    if (!data || data.length < 2) return;

    let min = Infinity, max = -Infinity;
    for (const v of data) { if (v < min) min = v; if (v > max) max = v; }
    if (max - min < 1e-6) { max = min + 1; }
    const pad = 3;
    const xw = (wCss - 2) / (data.length - 1);
    const yOf = (v) => hCss - pad - ((v - min) / (max - min)) * (hCss - pad * 2);

    // gradient area fill under the line
    const grad = ctx.createLinearGradient(0, 0, 0, hCss);
    grad.addColorStop(0, color + '55');
    grad.addColorStop(1, color + '00');
    ctx.beginPath();
    ctx.moveTo(1, yOf(data[0]));
    for (let i = 1; i < data.length; i++) ctx.lineTo(1 + i * xw, yOf(data[i]));
    ctx.lineTo(1 + (data.length - 1) * xw, hCss);
    ctx.lineTo(1, hCss);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(1, yOf(data[0]));
    for (let i = 1; i < data.length; i++) ctx.lineTo(1 + i * xw, yOf(data[i]));
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.4;
    ctx.stroke();
  });

  const last = data && data.length ? data[data.length - 1] : 0;
  return h('div', { className: 'chart-box' },
    h('div', { className: 'label' },
      h('span', null, label),
      h('b', null, format(last))
    ),
    h('canvas', { ref })
  );
}

/**
 * Find-a-person panel: search by name, family, settlement, ideology, life
 * stage or #id. Search runs only on keystrokes (never in the sim loop);
 * clicking a result selects, centers and follows the agent on the map.
 */
function AgentSearchPanel({ onSearch, onPick }) {
  const [q, setQ] = useState('');
  const [results, setResults] = useState([]);

  const run = (value) => {
    setQ(value);
    setResults(value.trim() ? onSearch(value) : []);
  };

  return h('div', { className: 'section' },
    h('h3', null, 'Find People'),
    h('input', {
      type: 'text', value: q, placeholder: 'name, family, city, creed, #id…',
      onChange: (e) => run(e.target.value)
    }),
    results.length > 0 ? h('div', { className: 'search-results' },
      results.map((r) => h('button', {
        key: r.id, className: 'search-hit',
        onClick: () => { onPick(r.id); setResults([]); setQ(''); }
      },
        h('b', null, `${r.sex === 'F' ? '♀' : '♂'} ${r.name}`),
        h('span', null, `${r.stage}, ${r.age} · ${r.home} · ${r.state}`)
      ))
    ) : (q.trim() ? h('div', { className: 'mem' }, 'No one found.') : null)
  );
}

// ========== src/ui/Timeline.js ==========



const WINDOW_YEARS = 80; // how much history stays visible before sliding off

/**
 * "Birds on a wire" timeline. Milestones (wars, foundings, collapses,
 * discoveries, plagues, disasters) perch as emoji on a horizontal wire that
 * slides left as the years pass; click one for a summary bubble. Mostly
 * static — new events appear at the right edge and drift off the left.
 */
function Timeline({ milestones, tick, ticksPerYear }) {
  const [popup, setPopup] = useState(null);

  const now = tick / ticksPerYear;
  const t0 = Math.max(0, now - WINDOW_YEARS);
  const span = Math.max(1, now - t0);
  const xOf = (yr) => `${((yr - t0) / span) * 96 + 2}%`;

  // decade gridlines
  const decades = [];
  for (let y = Math.ceil(t0 / 10) * 10; y <= now; y += 10) decades.push(y);

  const visible = [];
  for (let i = milestones.length - 1; i >= 0 && visible.length < 90; i--) {
    const m = milestones[i];
    if (m.tick / ticksPerYear < t0) break;
    visible.push(m);
  }
  visible.reverse();

  return h('div', { className: 'timeline' },
    h('div', { className: 'tl-title' }, 'CHRONICLE · last ' + Math.round(span) + ' years'),
    h('div', { className: 'wire' }),
    decades.map((y) => h('div', { key: 'y' + y, className: 'yearmark', style: { left: xOf(y) } },
      h('div', { className: 'tickline' }),
      h('span', null, 'Y' + y)
    )),
    visible.map((m, i) => h('button', {
      key: m.tick + '-' + i,
      className: 'milestone' + (i % 2 ? ' row1' : ''),
      style: { left: xOf(m.tick / ticksPerYear) },
      title: `Y${m.year} — ${m.text}`,
      onClick: (e) => {
        e.stopPropagation();
        setPopup(popup && popup.m === m ? null : { m, x: e.currentTarget.offsetLeft });
      }
    }, m.icon)),
    h('div', { className: 'tl-now' }, 'Y' + (now | 0)),
    popup ? h('div', {
      className: 'tl-popup',
      style: { left: Math.max(120, Math.min(popup.x, 99999)) }
    },
      h('b', null, `Y${popup.m.year} `),
      `${popup.m.icon} ${popup.m.text}`,
      h('button', { className: 'tiny', style: { marginLeft: 8 }, onClick: () => setPopup(null) }, '✕')
    ) : null
  );
}

// ========== src/App.js ==========













// Simulation ticks per animation frame. Values below 1 tick every few frames
// (0.1× = one tick per ~10 frames) — agent motion stays smooth because the
// renderer interpolates positions between ticks.
const SPEEDS = [0.1, 0.25, 0.5, 1, 2, 4, 8, 16];
const DEFAULT_SPEED_IDX = 3; // 1×

/**
 * App shell. The Simulation and Renderer live in refs — React NEVER holds
 * per-agent state. The UI reads a compact snapshot 4×/sec; the canvas is
 * repainted every animation frame by the renderer directly.
 */
function App() {
  const canvasRef = useRef(null);
  const simRef = useRef(null);
  const rendererRef = useRef(null);
  const runningRef = useRef(true);
  const speedRef = useRef(1);

  const [running, setRunning] = useState(true);
  const [speedIdx, setSpeedIdx] = useState(DEFAULT_SPEED_IDX);
  const [seed, setSeed] = useState(DEFAULT_PARAMS.seed);
  const [worldSize, setWorldSize] = useState(1);
  const [stressMode, setStressMode] = useState(false);
  const [params, setParams] = useState({ ...DEFAULT_PARAMS });
  const [overlay, setOverlayState] = useState('none');
  const [showRoutes, setShowRoutesState] = useState(false);
  const [showTrails, setShowTrailsState] = useState(true);
  const [, setSelection] = useState(null);
  const [armedGod, setArmedGod] = useState(null); // calamity awaiting a map click
  const [panel, setPanel] = useState(null); // mobile drawer: null | 'controls' | 'stats'
  const followRef = useRef(null); // agent id the camera is following
  const armedGodRef = useRef(null);
  const [ui, setUi] = useState({ stats: {}, events: [], history: emptyHistory(), milestones: [], fps: 0, tps: 0, inspector: null });

  runningRef.current = running;
  speedRef.current = SPEEDS[speedIdx];
  armedGodRef.current = armedGod;

  // ---- engine bootstrap + master loop (mounted once) ----------------------
  useEffect(() => {
    const canvas = canvasRef.current;
    const renderer = new Renderer(canvas);
    rendererRef.current = renderer;

    const sim = new Simulation({ ...DEFAULT_PARAMS });
    simRef.current = sim;

    const parent = canvas.parentElement;
    const doResize = () => {
      renderer.resize(parent.clientWidth, parent.clientHeight);
      if (renderer.sim) renderer.draw();
    };
    doResize();
    renderer.attach(sim);
    const ro = new ResizeObserver(doResize);
    ro.observe(parent);

    let raf;
    let frames = 0, ticks = 0, lastRate = performance.now(), lastSnap = 0;
    let fps = 0, tps = 0;
    let acc = 0; // fractional tick accumulator (enables sub-1× speeds)

    const loop = (now) => {
      const s = simRef.current;
      let alpha = 1;
      // batched ticks per frame, with a wall-clock budget so UI never freezes
      if (runningRef.current && s) {
        acc += speedRef.current;
        let n = Math.floor(acc);
        if (n > 0) {
          const budget = performance.now() + 14; // ms per frame for simulation
          let done = 0;
          while (done < n) {
            s.tickOnce();
            ticks++; done++;
            if (performance.now() > budget) break;
          }
          acc -= done;
          if (acc > 3) acc = 0; // can't keep up — drop the backlog, no spiral
        }
        // at sub-1× speeds, acc (0..1) is the progress toward the next tick:
        // use it to interpolate agent positions for butter-smooth motion
        if (speedRef.current < 1) alpha = Math.min(1, acc);
      }
      // follow-cam: keep the tracked agent centered while it lives
      if (followRef.current != null && s) {
        const fa = s.agentById.get(followRef.current);
        if (fa && !fa.dead) { renderer.view.cx = fa.x; renderer.view.cy = fa.y; }
        else followRef.current = null;
      }
      renderer.draw(alpha);
      frames++;

      if (now - lastRate >= 1000) {
        fps = frames; tps = ticks;
        frames = 0; ticks = 0; lastRate = now;
      }
      // snapshot for the React panels 4×/sec (keeps React work tiny)
      if (now - lastSnap >= 250 && s) {
        lastSnap = now;
        setUi({
          stats: s.stats,
          events: s.events.slice(),
          history: s.history,
          milestones: s.milestones,
          fps, tps,
          inspector: buildInspector(s, renderer.selected)
        });
      }
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, []);

  // ---- restart: build a fresh world from the draft parameters -------------
  const restart = useCallback(() => {
    const size = WORLD_SIZES[worldSize];
    const startPop = stressMode ? Math.max(2200, params.startPop) : params.startPop;
    const sim = new Simulation({
      ...params, seed, startPop,
      worldW: size.w, worldH: size.h
    });
    simRef.current = sim;
    rendererRef.current.attach(sim);
    rendererRef.current.selected = null;
    setSelection(null);
    setPanel(null);
  }, [params, seed, worldSize, stressMode]);

  // live parameter changes flow straight into the running engine
  const setParam = useCallback((key, value) => {
    setParams((p) => ({ ...p, [key]: value }));
    if (simRef.current) simRef.current.params[key] = value;
  }, []);

  const setOverlay = (o) => {
    setOverlayState(o);
    const r = rendererRef.current;
    if (r) { r.overlay = o; r.lastOverlayTick = -999; }
  };
  const setShowRoutes = (v) => { setShowRoutesState(v); if (rendererRef.current) rendererRef.current.showRoutes = v; };
  const setShowTrails = (v) => { setShowTrailsState(v); if (rendererRef.current) rendererRef.current.showTrails = v; };

  // targetable calamities arm the cursor; the next map click strikes there
  const TARGETABLE = ['drought', 'plague', 'earthquake', 'wildfire', 'flood', 'migration'];
  const godAction = (kind) => {
    const s = simRef.current;
    if (!s) return;
    if (kind === 'globalDrought') s.forceDrought();
    else if (kind === 'addResources') s.addResources();
    else if (TARGETABLE.includes(kind)) {
      setArmedGod((cur) => (cur === kind ? null : kind));
      setPanel(null); // slide the drawer away so the map can be tapped
    }
  };

  // ---- canvas interaction: drag/touch = pan, wheel/pinch = zoom, tap = inspect
  useEffect(() => {
    const canvas = canvasRef.current;
    let dragging = false, moved = false, lx = 0, ly = 0;
    const pointers = new Map(); // active pointers → pinch support on touch
    let pinchDist = 0;

    const down = (e) => {
      canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
      pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 1) {
        dragging = true; moved = false; lx = e.clientX; ly = e.clientY;
      } else if (pointers.size === 2) {
        // second finger down: switch from pan to pinch
        dragging = false; moved = true;
        const [p1, p2] = [...pointers.values()];
        pinchDist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
      }
    };
    const move = (e) => {
      if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
      if (pointers.size === 2) {
        // pinch: zoom toward the midpoint of the two fingers
        const [p1, p2] = [...pointers.values()];
        const d = Math.hypot(p1.x - p2.x, p1.y - p2.y);
        if (pinchDist > 0 && d > 0) {
          const rect = canvas.getBoundingClientRect();
          const mx = (p1.x + p2.x) / 2 - rect.left;
          const my = (p1.y + p2.y) / 2 - rect.top;
          rendererRef.current.zoomAt(mx, my, d / pinchDist);
        }
        pinchDist = d;
        return;
      }
      if (!dragging) return;
      const dx = e.clientX - lx, dy = e.clientY - ly;
      if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
      rendererRef.current.panBy(dx, dy);
      lx = e.clientX; ly = e.clientY;
    };
    const up = (e) => {
      pointers.delete(e.pointerId);
      if (pointers.size < 2) pinchDist = 0;
      if (dragging && !moved) {
        const rect = canvas.getBoundingClientRect();
        if (armedGodRef.current) {
          // a calamity is armed: this click chooses where it strikes
          const [wx, wy] = rendererRef.current.screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
          const s = simRef.current;
          const kind = armedGodRef.current;
          if (s) {
            if (kind === 'migration') s.triggerMigrationPressure(wx, wy);
            else s.spawnDisaster(kind, wx, wy);
          }
          setArmedGod(null);
        } else {
          const hit = rendererRef.current.pickAt(e.clientX - rect.left, e.clientY - rect.top);
          rendererRef.current.selected = hit;
          if (simRef.current) simRef.current.debugAgentId = hit && hit.type === 'agent' ? hit.id : -1;
          if (!hit || hit.type !== 'agent' || hit.id !== followRef.current) followRef.current = null;
          setSelection(hit);
        }
      }
      dragging = false;
    };
    const cancelCtx = (e) => { e.preventDefault(); setArmedGod(null); };
    const cancelKey = (e) => { if (e.key === 'Escape') setArmedGod(null); };
    canvas.addEventListener('contextmenu', cancelCtx);
    window.addEventListener('keydown', cancelKey);
    const wheel = (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      rendererRef.current.zoomAt(e.clientX - rect.left, e.clientY - rect.top, e.deltaY < 0 ? 1.15 : 0.87);
    };
    const cancel = (e) => { pointers.delete(e.pointerId); if (pointers.size < 2) pinchDist = 0; dragging = false; };
    canvas.addEventListener('pointerdown', down);
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    window.addEventListener('pointercancel', cancel);
    canvas.addEventListener('wheel', wheel, { passive: false });
    return () => {
      canvas.removeEventListener('pointerdown', down);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      canvas.removeEventListener('wheel', wheel);
      window.removeEventListener('pointercancel', cancel);
      canvas.removeEventListener('contextmenu', cancelCtx);
      window.removeEventListener('keydown', cancelKey);
    };
  }, []);

  useEffect(() => {
    if (canvasRef.current) canvasRef.current.style.cursor = armedGod ? 'crosshair' : '';
  }, [armedGod]);

  const clearSelection = () => {
    setSelection(null);
    followRef.current = null;
    if (rendererRef.current) rendererRef.current.selected = null;
    if (simRef.current) simRef.current.debugAgentId = -1;
  };
  // user-driven search (runs only on keystrokes, never in the sim loop)
  const onSearch = (q) => simRef.current ? searchAgents(simRef.current, q) : [];
  const onPick = (id) => {
    const s = simRef.current, r = rendererRef.current;
    if (!s || !r) return;
    const a = s.agentById.get(id);
    if (!a) return;
    r.selected = { type: 'agent', id };
    s.debugAgentId = id;
    r.view.cx = a.x; r.view.cy = a.y;
    if (r.view.scale < 12) r.view.scale = 14;
    followRef.current = id;
    setSelection({ type: 'agent', id });
    setPanel(null);
  };
  const onFollow = (id) => { followRef.current = followRef.current === id ? null : id; };
  const st = ui.stats || {};

  const legendRow = (bg, label, extra) => h('div', { className: 'row' },
    h('div', { className: 'sw', style: Object.assign({ background: bg }, extra || {}) }), label);

  return h('div', { className: 'app' },
    h('div', { className: 'topbar' },
      h('button', {
        className: 'mobile-only' + (panel === 'controls' ? ' on' : ''),
        onClick: () => setPanel(panel === 'controls' ? null : 'controls')
      }, '☰'),
      h('h1', null, '⬡ HUMAN CIVILIZATION EMERGENCE SIMULATOR'),
      h('button', { className: 'primary', onClick: () => setRunning(!running) }, running ? '❚❚ Pause' : '▶ Play'),
      h('div', { style: { display: 'flex', gap: 4 } },
        SPEEDS.map((s, i) => h('button', {
          key: s, className: 'tiny' + (speedIdx === i ? ' on' : ''),
          title: s < 1 ? 'Slow motion — great for watching individual agents' : undefined,
          onClick: () => setSpeedIdx(i)
        }, (s < 1 ? String(s).replace('0.', '.') : s) + '×'))
      ),
      h('button', { onClick: restart }, '⟲ Restart'),
      h('div', { className: 'spacer' }),
      h('span', { className: 'chip' }, 'Year ', h('b', null, st.year ?? 0)),
      h('span', { className: 'chip hide-sm' }, 'Tick ', h('b', null, st.tick ?? 0)),
      h('span', { className: 'chip' }, 'Pop ', h('b', null, st.population ?? 0)),
      h('span', { className: 'chip hide-sm' }, h('b', null, ui.fps), ' fps · ', h('b', null, ui.tps), ' tps'),
      h('button', {
        className: 'mobile-only' + (panel === 'stats' ? ' on' : ''),
        onClick: () => setPanel(panel === 'stats' ? null : 'stats')
      }, '📊')
    ),

    h('div', {
      className: 'main' + (panel === 'controls' ? ' show-left' : panel === 'stats' ? ' show-right' : '')
    },
      panel ? h('div', { className: 'drawer-backdrop', onClick: () => setPanel(null) }) : null,
      h(Controls, {
        params, setParam, seed, setSeed, worldSize, setWorldSize,
        onRestart: restart, overlay, setOverlay,
        showRoutes, setShowRoutes, showTrails, setShowTrails,
        godAction, armedGod, stressMode, setStressMode
      }),

      h('div', { className: 'map-area' },
        h('canvas', { ref: canvasRef, style: { touchAction: 'none' } }),
        h('div', { className: 'legend' },
          legendRow('#1d4e7a', 'Water'),
          legendRow('#607a46', 'Plains'),
          legendRow('#2c5a34', 'Forest'),
          legendRow('#5c8c42', 'Fertile'),
          legendRow('#c4a86e', 'Desert'),
          legendRow('#8a8a8f', 'Mountain'),
          h('div', { className: 'row', style: { marginTop: 4 } },
            h('div', { className: 'sw', style: { background: '#5eead4', borderRadius: '50%' } }), 'Agents'),
          h('div', { className: 'row' },
            h('div', { className: 'sw', style: { background: '#96ff5a', borderRadius: '50%' } }), 'Sick'),
          h('div', { className: 'row' },
            h('div', { className: 'sw', style: { border: '2px solid #78e6ff', background: 'transparent' } }), 'Trade route'),
          overlay !== 'none'
            ? h('div', { className: 'row', style: { marginTop: 4, color: 'var(--accent)' } }, 'Overlay: ' + overlay)
            : null
        ),
        armedGod ? h('div', { className: 'god-banner' },
          `☄ Click the map to unleash ${armedGod.toUpperCase()} — Esc or right-click to cancel`) : null,
        h(Timeline, { milestones: ui.milestones || [], tick: st.tick || 0, ticksPerYear: TICKS_PER_YEAR }),
        h(Inspector, { data: ui.inspector, onClose: clearSelection, onFollow })
      ),

      h(Analytics, { stats: ui.stats, history: ui.history, events: ui.events, onSearch, onPick })
    )
  );
}

function emptyHistory() {
  return { pop: [], food: [], settlements: [], conflicts: [], disease: [], tech: [], inequality: [], deaths: [] };
}

/** Copy the selected agent/settlement into a plain display object. */
function buildInspector(sim, sel) {
  if (!sel) return null;
  if (sel.type === 'agent') {
    const a = sim.agentById.get(sel.id);
    if (!a) return null;
    const home = a.home >= 0 ? sim.settlementById.get(a.home) : null;
    const traitVals = {
      curious: a.curiosity, aggressive: a.aggression, clever: a.intelligence,
      social: a.sociability, greedy: a.greed, empathic: a.empathy
    };
    const traits = Object.entries(traitVals).sort((x, y) => y[1] - x[1]).slice(0, 3)
      .map(([k, v]) => `${k} ${(v * 100) | 0}%`);
    const skills = Object.entries(a.skills).sort((x, y) => y[1] - x[1]).slice(0, 3)
      .map(([k, v]) => `${k} ${(v * 100) | 0}%`);
    let friends = 0, enemies = 0;
    for (const v of a.rel.values()) { if (v > 0.3) friends++; else if (v < -0.3) enemies++; }
    const spouse = a.spouse >= 0 ? sim.agentById.get(a.spouse) : null;
    const mother = a.mother >= 0 ? sim.agentById.get(a.mother) : null;
    const father = a.father >= 0 ? sim.agentById.get(a.father) : null;
    let kidsAlive = 0;
    for (const cid of a.children) if (sim.agentById.get(cid)) kidsAlive++;
    // ---- AI-mind explain block (built only for the selected agent) ----
    const ctx = new Float32Array(CTX_DIM);
    buildContext(sim, a, ctx);
    const ideo = a.ideology != null ? sim.ideologyById.get(a.ideology) : null;
    const ai = {
      action: a.state,
      legality: canAgentPerformAction(a, 'exploring')
        ? 'all actions legal (adult)'
        : `restricted: ${a.lifeStage} may not explore/fight/migrate alone`,
      top: a.debugChoice ? a.debugChoice.top : [],
      learned: topLearned(a, ctx, 3),
      rewards: a.rewards.slice(-4),
      ema: (a.rewardEMA || 0).toFixed(2),
      eps: a.debugChoice ? a.debugChoice.eps : '—',
      mentor: a.learnedFrom
    };
    return {
      type: 'agent', id: a.id,
      name: `${a.firstName} ${a.lastName}`,
      sex: a.sex,
      pregnant: !!a.pregnant,
      stage: a.lifeStage,
      ideologyName: ideo ? ideo.name : null,
      ai,
      stateLabel: a.state, age: a.age | 0,
      homeName: home ? `of ${home.name}` : 'nomad',
      health: a.health | 0, hunger: a.hunger | 0, thirst: a.thirst | 0,
      energy: a.energy | 0, fear: a.fear | 0, sick: a.sick,
      food: a.inv.food.toFixed(1), wood: a.inv.wood.toFixed(1), wealth: a.inv.wealth.toFixed(1),
      spouseName: spouse ? `${spouse.firstName} ${spouse.lastName}` : (a.spouse >= 0 ? 'widowed' : '—'),
      childrenLabel: a.children.length ? `${kidsAlive} living of ${a.children.length}` : '—',
      parents: (mother || father)
        ? `${mother ? mother.firstName : '†'} & ${father ? father.firstName : '†'}`
        : (a.mother >= 0 || a.father >= 0 ? 'deceased' : 'unknown'),
      friends, enemies, traits, skills, memory: a.memory.slice(-4)
    };
  }
  if (sel.type === 'grave') {
    const gr = sim.graves.find((g) => g.id === sel.id);
    if (!gr) return null;
    return { type: 'grave', ...gr };
  }
  if (sel.type === 'ruin') {
    const r = sim.ruins?.find((ruin) => ruin.id === sel.id);
    if (!r) return null;
    return {
      type: 'ruin',
      id: r.id,
      name: r.name,
      icon: r.icon,
      cause: r.cause,
      year: r.year,
      finalMembers: r.finalMembers,
      stability: r.stability,
      foodStore: r.foodStore,
      refugees: r.refugees,
      casualties: r.casualties,
      summary: r.summary
    };
  }
  const s = sim.settlementById.get(sel.id);
  if (!s) return null;
  let allies = 0, enemies = 0;
  for (const v of s.relations.values()) { if (v > 0.5) allies++; else if (v < -0.4) enemies++; }
  const cultureTags = Object.entries(s.culture).sort((x, y) => y[1] - x[1]).slice(0, 3)
    .map(([k, v]) => `${k} ${(v * 100) | 0}%`);
  const buildings = Object.entries(s.buildings).filter(([, n]) => n > 0)
    .map(([k, n]) => `${k}×${n}`).join(' ') || 'none';
  const parent = s.parentSettlementId != null ? sim.settlementById.get(s.parentSettlementId) : null;
  return {
    type: 'settlement', id: s.id, name: s.name,
    specialty: s.specialty || null,
    lineage: s.parentSettlementId != null
      ? `⛺ colony of ${parent ? parent.name : s.parentName || 'a lost city'} (${s.originReason})`
      : (s.originReason === 'exploration' ? null : null),
    archetype: s.archetype, dominant: dominantCulture(s),
    founded: (s.founded / TICKS_PER_YEAR) | 0,
    members: s.members,
    stability: (s.stability * 100) | 0,
    foodStore: s.foodStore | 0, woodStore: s.woodStore | 0, stoneStore: s.stoneStore | 0,
    metalStore: s.metalStore | 0, luxuryStore: s.luxuryStore | 0,
    wealth: s.wealth | 0,
    tech: s.tech.toFixed(2), techPct: (s.tech / 12) * 100,
    defense: (s.defense * 100) | 0,
    leaderInfluence: (s.leaderInfluence * 100) | 0,
    sickCount: s.sickCount,
    buildings, tradePartners: s.tradePartners.size,
    allies, enemies, cultureTags,
    resources: s.resourceProfile
      ? `food ${s.resourceProfile.food | 0} · wood ${s.resourceProfile.wood | 0} · ore ${s.resourceProfile.metal | 0} · gems ${s.resourceProfile.gems | 0}`
      : 'surveying',
    discoveries: s.discoveries.slice()
  };
}
